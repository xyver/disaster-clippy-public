<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Clippy</title>
    <link rel="icon" type="image/png" href="/static/paperclip.png">
    <link rel="stylesheet" href="/static/user-app.css">
    <link rel="stylesheet" href="/static/chat.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>Disaster Clippy</h1>
            <p>Curated preparedness knowledge. Every answer, cited.</p>
            <p class="header-links">
                <a href="https://www.disasterclippy.com/about" target="_blank" rel="noopener noreferrer">About this project</a>
                | <a href="/suggest">Suggest a site</a>
                | <a href="/visualise">Visualise</a>
                <span id="adminLink" style="display: none;"> | <a href="/useradmin/">Local Settings</a></span>
            </p>
        </div>
    </header>

    <div class="stats-bar">
        <span id="indexStats">Loading...</span>
        <div class="stats-bar-controls">
            <!-- Search Language selector for pre-localized sources -->
            <div id="searchLanguageSelector" style="display: none;">
                <label for="searchLanguage" class="lang-label">Search:</label>
                <select id="searchLanguage" class="lang-select">
                    <option value="en">English</option>
                </select>
            </div>
            <!-- Runtime translation selector -->
            <div id="languageSelector" style="display: none;">
                <label for="articleLanguage" class="lang-label">Translate:</label>
                <select id="articleLanguage" class="lang-select">
                    <option value="en">English (Original)</option>
                </select>
            </div>
            <button id="toggleSources" aria-expanded="false" aria-controls="sourcesPanel">Collection</button>
        </div>
    </div>

    <div class="sources-panel" id="sourcesPanel">
        <h3>Collection</h3>
        <div class="sources-grid" id="sourcesGrid">
            Loading sources...
        </div>
        <div class="sources-actions">
            <button id="selectAll">Select All</button>
            <button id="selectNone">Select None</button>
        </div>
    </div>

    <div class="container">
        <div class="chat-panel">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="message-content">What are you looking for? I'll search the collection and point you to the source.</div>
                </div>
            </div>
            <div class="loading" id="loading">Searching collection...</div>
            <div class="chat-input">
                <div class="connection-status" id="connectionStatus" title="Connection status">
                    <span class="connection-dot online" id="connectionDot"></span>
                    <span class="connection-label" id="connectionLabel">Checking...</span>
                </div>
                <form id="chatForm">
                    <textarea id="userInput" placeholder="Describe what you need help with..." rows="2"></textarea>
                    <button type="submit" id="sendBtn">Send</button>
                </form>
            </div>
        </div>

    </div>

    <script src="/static/chat-utils.js"></script>
    <script src="/static/chat.js"></script>
    <script>
        // Check if admin UI is available (not PUBLIC_MODE)
        fetch('/api/admin-available')
            .then(r => r.json())
            .then(data => {
                if (data.available) {
                    document.getElementById('adminLink').style.display = 'inline';
                    // Language selectors are admin-only — only load when admin is available
                    loadLanguageSelector();
                    loadSearchLanguageSelector();
                }
            })
            .catch(() => {}); // Silently fail if endpoint unavailable

        // Language selector for article translation (Phase 1)
        async function loadLanguageSelector() {
            try {
                console.log('[Language] Loading language selector...');
                const response = await fetch('/useradmin/api/available-languages');
                const data = await response.json();
                console.log('[Language] Available languages:', data);

                const installed = (data.languages || []).filter(l => l.installed);
                console.log('[Language] Installed packs:', installed.map(l => l.code));

                if (installed.length === 0) {
                    console.log('[Language] No language packs installed - hiding selector');
                    return;
                }

                // Show the selector
                const selectorDiv = document.getElementById('languageSelector');
                const select = document.getElementById('articleLanguage');

                // Add installed languages to dropdown
                installed.forEach(lang => {
                    const option = document.createElement('option');
                    option.value = lang.code;
                    option.textContent = lang.native_name ?
                        `${lang.display_name} (${lang.native_name})` : lang.display_name;
                    select.appendChild(option);
                });

                // Set current active language from response
                const activeLanguage = data.active_language || 'en';
                console.log('[Language] Active language:', activeLanguage);
                select.value = activeLanguage;

                // Update border color to indicate active translation
                if (activeLanguage !== 'en') {
                    select.style.borderColor = '#ad4f2d';
                }

                // Show selector
                selectorDiv.style.display = 'flex';
                selectorDiv.style.alignItems = 'center';
                console.log('[Language] Selector now visible');

                // Handle language change
                select.addEventListener('change', async function() {
                    const langCode = this.value;
                    console.log('[Language] Setting language to:', langCode);

                    // Show loading state
                    this.disabled = true;
                    const originalBg = this.style.background;
                    this.style.background = '#0f3460';

                    try {
                        const setResponse = await fetch('/useradmin/api/set-language', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ language_code: langCode })
                        });
                        const result = await setResponse.json();
                        console.log('[Language] Set language result:', result);

                        this.style.background = originalBg;
                        this.disabled = false;
                        this.style.borderColor = langCode !== 'en' ? '#ad4f2d' : '#d5c8a9';
                    } catch (e) {
                        console.error('[Language] Failed to set language:', e);
                        this.style.background = originalBg;
                        this.style.borderColor = '#ad4f2d';
                        this.disabled = false;
                    }
                });

            } catch (e) {
                console.error('[Language] Language selector error:', e);
            }
        }

        // Search language selector for pre-localized sources (Phase 4)
        async function loadSearchLanguageSelector() {
            try {
                console.log('[SearchLang] Loading search language selector...');
                const response = await fetch('/useradmin/api/all-localized-sources');
                const data = await response.json();
                console.log('[SearchLang] Localized sources:', data);

                const localizedSources = data.sources || [];
                if (localizedSources.length === 0) {
                    console.log('[SearchLang] No localized sources - hiding selector');
                    return;
                }

                // Get unique languages from localized sources
                const languageMap = new Map();
                localizedSources.forEach(source => {
                    if (source.language && source.language !== 'en') {
                        if (!languageMap.has(source.language)) {
                            languageMap.set(source.language, {
                                code: source.language,
                                name: source.language_name || source.language.toUpperCase(),
                                sources: []
                            });
                        }
                        languageMap.get(source.language).sources.push(source.source_id);
                    }
                });

                if (languageMap.size === 0) {
                    console.log('[SearchLang] No non-English localized sources');
                    return;
                }

                // Show the selector
                const selectorDiv = document.getElementById('searchLanguageSelector');
                const select = document.getElementById('searchLanguage');

                // Add languages to dropdown
                languageMap.forEach((lang, code) => {
                    const option = document.createElement('option');
                    option.value = code;
                    option.textContent = `${lang.name} (${lang.sources.length} sources)`;
                    select.appendChild(option);
                });

                // Check stored preference
                const storedLang = localStorage.getItem('searchLanguage') || 'en';
                if (languageMap.has(storedLang)) {
                    select.value = storedLang;
                    select.style.borderColor = '#ad4f2d';
                }

                // Show selector
                selectorDiv.style.display = 'flex';
                selectorDiv.style.alignItems = 'center';
                console.log('[SearchLang] Selector now visible');

                // Handle language change
                select.addEventListener('change', function() {
                    const langCode = this.value;
                    console.log('[SearchLang] Setting search language to:', langCode);

                    // Store preference
                    localStorage.setItem('searchLanguage', langCode);

                    this.style.borderColor = langCode !== 'en' ? '#ad4f2d' : '#d5c8a9';

                    // The search routing will use this preference on next query
                    // Could reload sources list here if needed
                });

            } catch (e) {
                console.error('[SearchLang] Search language selector error:', e);
            }
        }

        // Search language selector loaded inside admin check above
    </script>
</body>
</html>
